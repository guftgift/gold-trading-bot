name: 📈 Stock Alert Bot

on:
  # ─── รันวันละ 1 ครั้ง เวลา 08:00 น. ไทย (01:00 UTC) ─────────────────────
  schedule:
    - cron: '0 1 * * 1-5'   # 08:00 น. ไทย วันจันทร์-ศุกร์

  # ─── รันมือได้ทันที ───────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run (ไม่ส่ง Telegram จริง)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-stock-bot:
    name: Run Stock Alert Bot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📈 Run Stock Alert Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN:            ${{ github.event.inputs.dry_run || 'false' }}
        run: python stock_alert_bot.py

      - name: 📋 Show error log (on failure)
        if: failure()
        run: |
          echo "❌ Stock Bot failed"
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')"
